<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر العبايات</title>

    <style>
        body {
            font-family: "Tahoma", sans-serif;
            margin: 0;
            background-color: #f7f7f7;
            color: #222;
        }

        header {
            background-color: #000;
            color: #fff;
            padding: 25px;
            text-align: center;
            font-size: 28px;
            letter-spacing: 1px;
        }

        .hero {
            text-align: center;
            padding: 40px 20px;
            background-color: #e8e8e8;
        }

        .hero h2 {
            font-size: 26px;
            margin-bottom: 10px;
        }

        .products {
            display: flex;
            justify-content: center;
            gap: 25px;
            padding: 40px 20px;
            flex-wrap: wrap;
        }

        .product {
            background: #fff;
            width: 300px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            padding-bottom: 20px;
        }

        .product img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            background-color: #ddd; /* مكان الصورة */
        }

        .product h3 {
            margin: 15px 0 5px;
            font-size: 22px;
        }

        .product p {
            color: #555;
            margin-bottom: 10px;
        }

        .contact {
            background-color: #000;
            color: #fff;
            padding: 40px 20px;
            text-align: center;
        }

        .contact h2 {
            margin-bottom: 15px;
            font-size: 26px;
        }

        .contact a {
            display: block;
            color: #fff;
            font-size: 20px;
            margin: 8px 0;
            text-decoration: none;
        }

        footer {
            background-color: #111;
            color: #ccc;
            text-align: center;
            padding: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <header>
        متجر العبايات
    </header>

    <section class="hero">
        <h2>أهلاً بك في متجر العبايات</h2>
        <p>أناقة – فخامة – جودة عالية</p>
    </section>

    <section class="products">
        <!-- عباية 1 -->
        <div class="product">
            <img src="abya.jpg" alt="عباية 1">
            <h3>عباية فاخرة</h3>
            <p>عبايه سودا فخمه بتفاصيل مورده.</p>
        </div>

        <!-- عباية 2 -->
        <div class="product">
            <img src="abya2.jpg" alt="عباية 2">
            <h3>عباية كلاسيكية</h3>
            <p>عبايه سودا فحم مع ورود سودا </p>
        </div>
    </section>

    <section class="contact"><section class="contact">
    <h2>تواصل معنا</h2>

    <!-- رابط واتساب -->
    <a href="https://wa.me/رقمك" target="_blank">واتساب</a>

    <!-- رابط إنستغرام -->
    <a href="https://instagram.com/اسم_حسابك" target="_blank">إنستغرام</a>


</section>

</body>
</html>
